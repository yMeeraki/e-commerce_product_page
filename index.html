<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | E-commerce product page</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header_container">
    <div class="header_container-navbar">
      <a class="header_container-logo" href="index.html">sneakers</a>
      <nav class="navbar">
        <ul>
          <li class="navbar-list_items"><a class="navbar-list_items-links" href="#">Collections</a></li>
          <li class="navbar-list_items"><a class="navbar-list_items-links" href="#">Men</a></li>
          <li class="navbar-list_items"><a class="navbar-list_items-links" href="#">Women</a></li>
          <li class="navbar-list_items"><a class="navbar-list_items-links" href="#">About</a></li>
          <li class="navbar-list_items"><a class="navbar-list_items-links" href="#">Contact</a></li>
        </ul>
      </nav>
    </div>
    <div class="header_container-user">
      <img class="product_gallery-product" class="header_container-user-avatar" src="./images/image-avatar.png"
        alt="avatar">
    </div>
  </header>

  <main class="main-container">
    <section class="product_gallery-container">
      <img class="product_gallery-product" src="./images/image-product-1.jpg" alt="product">
      <!-- <img class="product_gallery-product" src="./images/image-product-2.jpg" alt="product">
      <img class="product_gallery-product" src="./images/image-product-3.jpg" alt="product">
      <img class="product_gallery-product" src="./images/image-product-4.jpg" alt="product"> -->
    </section>
    <section class="product_details-container">
      <div>
        <div class="product_details-heading">
          <h6>
            Sneaker Company
          </h6>
          <h1>
            Fall Limited Edition Sneakers
          </h1>
        </div>
        <div class="product_details-details">
          <p>
            These low-profile sneakers are your perfect casual wear companion. Featuring a
            durable rubber outer sole, they’ll withstand everything the weather can offer.
          </p>
          <div>
            <div class="product_details-prices">
              <p><span class="current-price">$125.00</span> <span class="discount">50%</span></p>
              <span class="old-price">$250.00</span>
            </div>
          </div>
        </div>
        <div class="product_details-button">
          <div class="add-and-sub-btn">
            <button class="minus">
              <i class="fa-solid fa-minus" style="color: rgb(255, 212, 59);"></i>
            </button>

            <span id="count">0</span>

            <button class="plus">
              <i class="fa-solid fa-plus" style="color: rgb(255, 212, 59);"></i>
            </button>
          </div>
          <button class="btn">Add to Cart</button>
        </div>
      </div>
    </section>
  </main>
</body>
<script src="https://kit.fontawesome.com/c56e930ffe.js" crossorigin="anonymous"></script>

</html>
